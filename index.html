<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE 240 PING </title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            border: 1px solid #334155;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h2 { margin: 0; color: var(--accent); font-size: 1.5rem; }
        .header p { font-size: 0.85rem; color: var(--text-dim); margin-top: 5px; }

        .form-group { margin-bottom: 1rem; }
        
        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }

        #response {
            margin-top: 1.5rem;
            background: #000;
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #4ade80;
            display: none;
            overflow-x: auto;
            border-left: 4px solid var(--accent);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: var(--accent);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>Ringba Bid Checker</h2>
        <p>Production RTB v1.0</p>
    </div>

    <div class="form-group">
        <label>Caller ID (Phone Number)</label>
        <input type="text" id="cid" placeholder="14061571951" maxlength="11">
    </div>

    <div class="form-group">
        <label>State (2-Letter)</label>
        <input type="text" id="state" placeholder="FL" maxlength="2">
    </div>

    <div class="form-group">
        <label>ZIP Code</label>
        <input type="text" id="zip" placeholder="33101" maxlength="5">
    </div>

    <button onclick="executePing()">CHECK BID NOW</button>

    <div id="loader" class="loader">Querying Bidders...</div>
    <pre id="response"></pre>
</div>

<script>
    async function executePing() {
        const cid = document.getElementById('cid').value.trim();
        const state = document.getElementById('state').value.trim();
        const zip = document.getElementById('zip').value.trim();
        const output = document.getElementById('response');
        const loader = document.getElementById('loader');

        if (!cid || cid.length < 10) {
            alert("Please enter a valid 10 or 11 digit Phone Number (CID)");
            return;
        }

        // Configuration
        const campaignId = "ea7a4778555649298e6488ba7c47b381";
        const ringbaUrl = `https://rtb.ringba.com/v1/production/${campaignId}.json?CID=${cid}&State=${state}&Zip=${zip}`;
        
        // Proxy to bypass CORS on GitHub Pages
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(ringbaUrl)}`;

        // UI Reset
        output.style.display = "none";
        loader.style.display = "block";
        output.style.color = "#4ade80";

        try {
            const response = await fetch(proxiedUrl);
            const data = await response.json();

            loader.style.display = "none";
            output.style.display = "block";
            
            // Format output nicely
            output.textContent = JSON.stringify(data, null, 2);

            // Change color to red if no bid
            if (data.status === "NoBid" || !data.bidAmount) {
                output.style.color = "#fb7185";
            }

        } catch (error) {
            loader.style.display = "none";
            output.style.display = "block";
            output.style.color = "#fb7185";
            output.textContent = "Error: Connection failed.\nCheck your internet or the proxy status.";
        }
    }
</script>

</body>
</html>
